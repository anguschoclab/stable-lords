name: Daily Balance Report

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  simulate_and_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Headless Simulation
      run: npx tsx run_balance_report.ts

    - name: Commit Daily Balance Report
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add Daily_Balance_Report.md
        git commit -m "chore: update daily balance report [skip ci]" || echo "No changes to commit"
        git push
