name: Daily Simulation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.38
      - run: bun install
      - run: bun run benchmark.ts
      - name: Commit Report
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add Daily_Balance_Report.md
          git diff-index --quiet HEAD || git commit -m "chore: Update Daily Balance Report"
      - run: git push origin HEAD:main
